name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Check coverage
        run: go tool cover -func=coverage.out

  client-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [server-test, client-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v5
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/server:latest server/
          docker push ${{ env.IMAGE_PREFIX }}/server:latest
      - name: Build and push client image
        run: |
          docker build -t ${{ env.IMAGE_PREFIX }}/client:latest client/
          docker push ${{ env.IMAGE_PREFIX }}/client:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_KEY }}
          command_timeout: 10m
          script: cd ${{ github.event.repository.name }} && sudo ./deploy.sh
